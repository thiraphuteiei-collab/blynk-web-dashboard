<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ตั้งรหัสผ่านใหม่</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <section class="page-center">
    <div class="auth-card">
      <h1 class="brand-title">ตั้งรหัสผ่านใหม่</h1>
      <p class="brand-sub">กรอกรหัสผ่านใหม่ของคุณ</p>

      <div class="form-group">
        <label class="form-label" for="newPassword">รหัสผ่านใหม่</label>
        <div class="password-wrap">
          <input class="form-input" id="newPassword" type="password" placeholder="กรอกรหัสผ่านใหม่" />
          <button id="toggleResetPassword" class="password-toggle" type="button"></button>
        </div>
        <div class="field-hint">อย่างน้อย 8 ตัวอักษร</div>
        <div id="newPasswordError" class="field-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">ยืนยันรหัสผ่านใหม่</label>
        <div class="password-wrap">
          <input class="form-input" id="confirmPassword" type="password" placeholder="กรอกรหัสผ่านอีกครั้ง" />
          <button id="toggleResetConfirmPassword" class="password-toggle" type="button"></button>
        </div>
        <div id="confirmPasswordError" class="field-error"></div>
      </div>

      <button id="resetButton" class="btn btn-primary full" type="button">บันทึกรหัสผ่านใหม่</button>
      <div id="errorBox" class="message text-danger"></div>
      <div id="successBox" class="message text-success"></div>

      <div class="links-row">
        <a href="/login.html">กลับไปหน้าเข้าสู่ระบบ</a>
      </div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    redirectIfLoggedIn();
    setupPasswordToggle("toggleResetPassword", "newPassword");
    setupPasswordToggle("toggleResetConfirmPassword", "confirmPassword");

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");

    async function checkToken() {
      try {
        await fetchJson(`/api/reset-password/${token}`);
      } catch (error) {
        errorBox.textContent = error.message;
        document.getElementById("resetButton").disabled = true;
      }
    }

    document.getElementById("resetButton").addEventListener("click", async () => {
      const newPassword = document.getElementById("newPassword").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();
      const button = document.getElementById("resetButton");

      errorBox.textContent = "";
      successBox.textContent = "";
      clearFieldErrors(["newPassword", "confirmPassword"]);

      let hasError = false;

      if (!newPassword) {
        setFieldError("newPassword", "กรุณากรอกรหัสผ่านใหม่");
        hasError = true;
      } else if (!validatePassword(newPassword)) {
        setFieldError("newPassword", "รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร");
        hasError = true;
      }

      if (!confirmPassword) {
        setFieldError("confirmPassword", "กรุณายืนยันรหัสผ่านใหม่");
        hasError = true;
      } else if (newPassword !== confirmPassword) {
        setFieldError("confirmPassword", "รหัสผ่านไม่ตรงกัน");
        hasError = true;
      }

      if (hasError) return;

      try {
        setButtonLoading(button, true, "กำลังบันทึก...", "บันทึกรหัสผ่านใหม่");

        await fetchJson(`/api/reset-password/${token}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ newPassword, confirmPassword })
        });

        successBox.textContent = "ตั้งรหัสผ่านใหม่สำเร็จ กรุณาเข้าสู่ระบบอีกครั้ง";
        showToast("รีเซ็ตรหัสผ่านสำเร็จ", "success");

        setTimeout(() => {
          window.location.href = "/login.html";
        }, 900);
      } catch (error) {
        errorBox.textContent = error.message;
      } finally {
        setButtonLoading(button, false, "", "บันทึกรหัสผ่านใหม่");
      }
    });

    checkToken();
  </script>
</body>
</html>

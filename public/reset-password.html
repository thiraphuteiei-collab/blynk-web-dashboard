<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ตั้งรหัสผ่านใหม่</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <section class="page-center">
    <div class="auth-card">
      <h1 class="brand-title">ตั้งรหัสผ่านใหม่</h1>
      <p class="brand-sub">กรอกรหัสผ่านใหม่ของคุณ</p>

      <div class="form-group">
        <label class="form-label" for="newPassword">รหัสผ่านใหม่</label>
        <input class="form-input" id="newPassword" type="password" />
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">ยืนยันรหัสผ่านใหม่</label>
        <input class="form-input" id="confirmPassword" type="password" />
      </div>

      <button id="resetButton" class="btn btn-primary full" type="button">บันทึกรหัสผ่านใหม่</button>
      <div id="errorBox" class="message text-danger"></div>
      <div id="successBox" class="message text-success"></div>

      <div class="links-row">
        <a href="/login.html">กลับไปหน้าเข้าสู่ระบบ</a>
      </div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");

    async function checkToken() {
      try {
        await fetchJson(`/api/reset-password/${token}`);
      } catch (error) {
        errorBox.textContent = error.message;
        document.getElementById("resetButton").disabled = true;
      }
    }

    document.getElementById("resetButton").addEventListener("click", async () => {
      const newPassword = document.getElementById("newPassword").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      try {
        errorBox.textContent = "";
        successBox.textContent = "";

        const data = await fetchJson(`/api/reset-password/${token}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ newPassword, confirmPassword })
        });

        successBox.textContent = data.message;
        setTimeout(() => {
          window.location.href = "/login.html";
        }, 1000);
      } catch (error) {
        errorBox.textContent = error.message;
      }
    });

    checkToken();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <section class="page-center">
    <div class="auth-card">
      <h1 class="brand-title">Reset Password</h1>
      <p class="brand-sub">ตั้งรหัสผ่านใหม่ของคุณ</p>

      <div class="form-group">
        <label class="form-label" for="newPassword">New Password</label>
        <input class="form-input" id="newPassword" type="password" />
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input class="form-input" id="confirmPassword" type="password" />
      </div>

      <button id="resetPasswordButton" class="btn btn-primary full" type="button">บันทึกรหัสผ่านใหม่</button>

      <div id="errorBox" class="message text-danger"></div>
      <div id="successBox" class="message text-success"></div>

      <div class="links-row">
        <a href="/login.html">Back to Login</a>
      </div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";

    document.getElementById("resetPasswordButton").addEventListener("click", async () => {
      const newPassword = document.getElementById("newPassword").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();
      const errorBox = document.getElementById("errorBox");
      const successBox = document.getElementById("successBox");

      try {
        errorBox.textContent = "";
        successBox.textContent = "";

        if (!token) {
          throw new Error("Reset token ไม่ถูกต้อง");
        }

        if (!newPassword || !confirmPassword) {
          throw new Error("กรอกรหัสผ่านให้ครบ");
        }

        if (newPassword !== confirmPassword) {
          throw new Error("รหัสผ่านไม่ตรงกัน");
        }

        const data = await fetchJson("/api/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, newPassword })
        });

        successBox.textContent = data.message || "เปลี่ยนรหัสผ่านสำเร็จ";
        setTimeout(() => {
          window.location.href = "/login.html";
        }, 1000);
      } catch (error) {
        errorBox.textContent = error.message;
      }
    });

    document.getElementById("confirmPassword").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        document.getElementById("resetPasswordButton").click();
      }
    });
  </script>
</body>
</html>

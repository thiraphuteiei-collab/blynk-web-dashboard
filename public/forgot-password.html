<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ลืมรหัสผ่าน</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <section class="page-center">
    <div class="auth-card">
      <h1 class="brand-title">ลืมรหัสผ่าน</h1>
      <p class="brand-sub">กรอกอีเมลเพื่อสร้างลิงก์รีเซ็ตรหัสผ่าน</p>

      <div class="form-group">
        <label class="form-label" for="email">อีเมล</label>
        <input class="form-input" id="email" type="email" />
        <div id="emailError" class="field-error"></div>
      </div>

      <button id="forgotButton" class="btn btn-primary full" type="button">ดำเนินการต่อ</button>
      <div id="errorBox" class="message text-danger"></div>
      <div id="successBox" class="message text-success"></div>

      <div class="links-row">
        <a href="/login.html">กลับไปหน้าเข้าสู่ระบบ</a>
      </div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById("forgotButton").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const button = document.getElementById("forgotButton");
      const errorBox = document.getElementById("errorBox");
      const successBox = document.getElementById("successBox");

      errorBox.textContent = "";
      successBox.textContent = "";
      clearFieldErrors(["email"]);

      if (!email) {
        setFieldError("email", "กรุณากรอกอีเมล");
        return;
      }

      if (!validateEmail(email)) {
        setFieldError("email", "รูปแบบอีเมลไม่ถูกต้อง");
        return;
      }

      try {
        setButtonLoading(button, true, "กำลังดำเนินการ...", "ดำเนินการต่อ");

        const data = await fetchJson("/api/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        successBox.textContent = data.message;
        showToast("สร้างลิงก์รีเซ็ตแล้ว", "success");

        if (data.resetUrl) {
          setTimeout(() => {
            window.location.href = data.resetUrl;
          }, 900);
        }
      } catch (error) {
        errorBox.textContent = error.message;
      } finally {
        setButtonLoading(button, false, "", "ดำเนินการต่อ");
      }
    });
  </script>
</body>
</html>

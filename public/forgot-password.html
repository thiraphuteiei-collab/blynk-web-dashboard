<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <section class="page-center">
    <div class="auth-card">
      <h1 class="brand-title">Forgot Password</h1>
      <p class="brand-sub">Enter your email to create a reset link</p>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" id="email" type="email" />
      </div>

      <button id="forgotButton" class="btn btn-primary full" type="button">Continue</button>
      <div id="errorBox" class="message text-danger"></div>
      <div id="successBox" class="message text-success"></div>

      <div class="links-row">
        <a href="/login.html">Back to Login</a>
      </div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById("forgotButton").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const errorBox = document.getElementById("errorBox");
      const successBox = document.getElementById("successBox");

      try {
        errorBox.textContent = "";
        successBox.textContent = "";

        const data = await fetchJson("/api/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        successBox.textContent = "Reset link created. Redirecting...";
        setTimeout(() => {
          window.location.href = data.resetUrl;
        }, 700);
      } catch (error) {
        errorBox.textContent = error.message;
      }
    });
  </script>
</body>
</html>

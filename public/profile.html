<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>โปรไฟล์</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="top-title">
        <h1>โปรไฟล์และการตั้งค่า</h1>
        <p>จัดการข้อมูลบัญชีของคุณ</p>
      </div>

      <div class="top-actions">
        <div class="pill">ผู้ใช้: <strong id="currentUser">-</strong></div>
        <a class="btn btn-light" href="/dashboard.html">กลับหน้าแดชบอร์ด</a>
        <button class="btn btn-danger" type="button" onclick="logout()">ออกจากระบบ</button>
      </div>
    </div>

    <section class="grid-2">
      <div class="card">
        <h3>ข้อมูลบัญชี</h3>
        <div class="card-sub">แก้ไขชื่อผู้ใช้และอีเมล</div>

        <div class="settings-box">
          <div class="form-group">
            <label class="form-label" for="username">ชื่อผู้ใช้</label>
            <input class="form-input" id="username" type="text" />
            <div id="usernameError" class="field-error"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">อีเมล</label>
            <input class="form-input" id="email" type="email" />
            <div id="emailError" class="field-error"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="currentProfilePassword">รหัสผ่านปัจจุบัน</label>
            <div class="password-wrap">
              <input class="form-input" id="currentProfilePassword" type="password" />
              <button id="toggleProfilePassword" class="password-toggle" type="button"></button>
            </div>
            <div id="currentProfilePasswordError" class="field-error"></div>
          </div>

          <button id="saveProfileButton" class="btn btn-primary" type="button" disabled>บันทึกข้อมูล</button>
          <div id="profileMessage" class="message"></div>
        </div>
      </div>

      <div class="card">
        <h3>เปลี่ยนรหัสผ่าน</h3>
        <div class="card-sub">รหัสผ่านใหม่ต้องมีอย่างน้อย 8 ตัวอักษร</div>

        <div class="settings-box">
          <div class="form-group">
            <label class="form-label" for="currentPassword">รหัสผ่านปัจจุบัน</label>
            <div class="password-wrap">
              <input class="form-input" id="currentPassword" type="password" />
              <button id="toggleCurrentPassword" class="password-toggle" type="button"></button>
            </div>
            <div id="currentPasswordError" class="field-error"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="newPassword">รหัสผ่านใหม่</label>
            <div class="password-wrap">
              <input class="form-input" id="newPassword" type="password" />
              <button id="toggleNewPassword" class="password-toggle" type="button"></button>
            </div>
            <div class="field-hint">อย่างน้อย 8 ตัวอักษร</div>
            <div id="newPasswordError" class="field-error"></div>
          </div>

          <button id="savePasswordButton" class="btn btn-primary" type="button">เปลี่ยนรหัสผ่าน</button>
          <div id="passwordMessage" class="message"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="/js/app.js"></script>
  <script>
    redirectIfNotLoggedIn();
    renderTopUser();

    setupPasswordToggle("toggleProfilePassword", "currentProfilePassword");
    setupPasswordToggle("toggleCurrentPassword", "currentPassword");
    setupPasswordToggle("toggleNewPassword", "newPassword");

    const user = getStoredUser();
    const saveProfileButton = document.getElementById("saveProfileButton");
    let originalProfile = { username: "", email: "" };

    function updateProfileButtonState() {
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const changed = username !== originalProfile.username || email !== originalProfile.email;
      saveProfileButton.disabled = !changed;
    }

    async function loadProfile() {
      const data = await fetchJson(`/api/profile/${user.id}`);
      const profile = data.user;

      document.getElementById("username").value = profile.username || "";
      document.getElementById("email").value = profile.email || "";
      originalProfile = {
        username: profile.username || "",
        email: profile.email || ""
      };
      updateProfileButtonState();
    }

    document.getElementById("username").addEventListener("input", updateProfileButtonState);
    document.getElementById("email").addEventListener("input", updateProfileButtonState);

    document.getElementById("saveProfileButton").addEventListener("click", async () => {
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const currentPassword = document.getElementById("currentProfilePassword").value.trim();
      const box = document.getElementById("profileMessage");
      const button = document.getElementById("saveProfileButton");

      box.textContent = "";
      clearFieldErrors(["username", "email", "currentProfilePassword"]);

      let hasError = false;

      if (!username) {
        setFieldError("username", "กรุณากรอกชื่อผู้ใช้");
        hasError = true;
      }

      if (!email) {
        setFieldError("email", "กรุณากรอกอีเมล");
        hasError = true;
      } else if (!validateEmail(email)) {
        setFieldError("email", "รูปแบบอีเมลไม่ถูกต้อง");
        hasError = true;
      }

      if (!currentPassword) {
        setFieldError("currentProfilePassword", "กรุณากรอกรหัสผ่านปัจจุบัน");
        hasError = true;
      }

      if (hasError) return;

      try {
        setButtonLoading(button, true, "กำลังบันทึก...", "บันทึกข้อมูล");

        const data = await fetchJson(`/api/profile/${user.id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, currentPassword })
        });

        setStoredUser(data.user);
        renderTopUser();
        box.textContent = "บันทึกข้อมูลเรียบร้อย";
        box.className = "message text-success";
        document.getElementById("currentProfilePassword").value = "";
        originalProfile = { username, email };
        updateProfileButtonState();
        showToast("บันทึกข้อมูลเรียบร้อย", "success");
      } catch (error) {
        box.textContent = error.message;
        box.className = "message text-danger";
      } finally {
        setButtonLoading(button, false, "", "บันทึกข้อมูล");
      }
    });

    document.getElementById("savePasswordButton").addEventListener("click", async () => {
      const currentPassword = document.getElementById("currentPassword").value.trim();
      const newPassword = document.getElementById("newPassword").value.trim();
      const box = document.getElementById("passwordMessage");
      const button = document.getElementById("savePasswordButton");

      box.textContent = "";
      clearFieldErrors(["currentPassword", "newPassword"]);

      let hasError = false;

      if (!currentPassword) {
        setFieldError("currentPassword", "กรุณากรอกรหัสผ่านปัจจุบัน");
        hasError = true;
      }

      if (!newPassword) {
        setFieldError("newPassword", "กรุณากรอกรหัสผ่านใหม่");
        hasError = true;
      } else if (!validatePassword(newPassword)) {
        setFieldError("newPassword", "รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร");
        hasError = true;
      }

      if (hasError) return;

      try {
        setButtonLoading(button, true, "กำลังบันทึก...", "เปลี่ยนรหัสผ่าน");

        const data = await fetchJson(`/api/profile/${user.id}/password`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ currentPassword, newPassword })
        });

        box.textContent = data.message;
        box.className = "message text-success";
        document.getElementById("currentPassword").value = "";
        document.getElementById("newPassword").value = "";
        showToast("เปลี่ยนรหัสผ่านสำเร็จ", "success");
      } catch (error) {
        box.textContent = error.message;
        box.className = "message text-danger";
      } finally {
        setButtonLoading(button, false, "", "เปลี่ยนรหัสผ่าน");
      }
    });

    loadProfile();
  </script>
</body>
</html>

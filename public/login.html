<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เข้าสู่ระบบ</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <section class="page-center">
    <div class="auth-card">
      <h1 class="brand-title">ระบบควบคุมรดน้ำอัจฉริยะ</h1>
      <p class="brand-sub">เข้าสู่ระบบเพื่อดูสถานะและควบคุมระบบ</p>

      <div class="form-group">
        <label class="form-label" for="email">อีเมล</label>
        <input class="form-input" id="email" type="email" placeholder="name@example.com" />
        <div id="emailError" class="field-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">รหัสผ่าน</label>
        <div class="password-wrap">
          <input class="form-input" id="password" type="password" placeholder="กรอกรหัสผ่าน" />
          <button id="toggleLoginPassword" class="password-toggle" type="button"></button>
        </div>
        <div id="passwordError" class="field-error"></div>
      </div>

      <button id="loginButton" class="btn btn-primary full" type="button">เข้าสู่ระบบ</button>
      <div id="errorBox" class="message text-danger"></div>

      <div class="links-row">
        <a href="/register.html">สร้างบัญชีผู้ใช้</a>
        <a href="/forgot-password.html">ลืมรหัสผ่าน</a>
      </div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    redirectIfLoggedIn();
    setupPasswordToggle("toggleLoginPassword", "password");

    document.getElementById("loginButton").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorBox = document.getElementById("errorBox");
      const button = document.getElementById("loginButton");

      errorBox.textContent = "";
      clearFieldErrors(["email", "password"]);

      let hasError = false;

      if (!email) {
        setFieldError("email", "กรุณากรอกอีเมล");
        hasError = true;
      } else if (!validateEmail(email)) {
        setFieldError("email", "รูปแบบอีเมลไม่ถูกต้อง");
        hasError = true;
      }

      if (!password) {
        setFieldError("password", "กรุณากรอกรหัสผ่าน");
        hasError = true;
      }

      if (hasError) return;

      try {
        setButtonLoading(button, true, "กำลังเข้าสู่ระบบ...", "เข้าสู่ระบบ");

        const data = await fetchJson("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        setStoredToken(data.token);
        setStoredUser(data.user);
        showToast("เข้าสู่ระบบสำเร็จ", "success");

        setTimeout(() => {
          window.location.href = "/dashboard.html";
        }, 350);
      } catch (error) {
        errorBox.textContent = error.message;
      } finally {
        setButtonLoading(button, false, "", "เข้าสู่ระบบ");
      }
    });

    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("loginButton").click();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <section class="page-center">
    <div class="auth-card">
      <h1 class="brand-title">Smart Watering Control</h1>
      <p class="brand-sub">Monitor and control your watering system easily</p>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" id="email" type="email" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" id="password" type="password" />
      </div>

      <div class="checkbox-row">
        <input id="rememberMe" type="checkbox" />
        <label for="rememberMe">Remember me</label>
      </div>

      <button id="loginButton" class="btn btn-primary full" type="button">Login</button>
      <div id="errorBox" class="message text-danger"></div>

      <div class="links-row">
        <a href="/register.html">Create account</a>
        <a href="/forgot-password.html">Forgot password</a>
      </div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById("loginButton").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorBox = document.getElementById("errorBox");

      try {
        errorBox.textContent = "";
        const data = await fetchJson("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        setStoredToken(data.token);
        setStoredUser(data.user);
        window.location.href = "/dashboard.html";
      } catch (error) {
        errorBox.textContent = error.message;
      }
    });

    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        document.getElementById("loginButton").click();
      }
    });
  </script>
</body>
</html>

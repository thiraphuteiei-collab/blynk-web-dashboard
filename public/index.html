      display: flex;

    .gauge {
      --value: 0;
      --accent: var(--primary);
      --size: min(50vw, 220px);
      width: var(--size);
      height: calc(var(--size) / 2 + 10px);
      position: relative;
      overflow: hidden;
    }

    .gauge::before {
      content: "";
      position: absolute;
      inset: 0;
      border-top-left-radius: calc(var(--size) / 2);
      border-top-right-radius: calc(var(--size) / 2);
      border: 18px solid #e8edf5;
      border-bottom: 0;
    }

    .gauge::after {
      content: "";
      position: absolute;
      inset: 0;
      border-top-left-radius: calc(var(--size) / 2);
      border-top-right-radius: calc(var(--size) / 2);
      border: 18px solid transparent;
      border-bottom: 0;
      border-top-color: var(--accent);
      transform-origin: 50% 100%;
      transform: rotate(calc((var(--value) * 1.8deg) - 90deg));
      transition: transform 0.45s ease;
    }

    .gauge-value {
      position: absolute;
      left: 50%;
      bottom: 6px;
      transform: translateX(-50%);
      text-align: center;
      width: 100%;
      font-size: clamp(22px, 4vw, 30px);
      font-weight: 800;

    async function initDashboard() {
      try {
        el.currentUser.textContent = state.username || "admin";
        applyTheme(getSavedTheme());
        await fetchConfig();
        await Promise.all([fetchStatus(), fetchHistory()]);
      } catch (error) {
        showError(el.errorBox, error.message);
        el.onlineText.textContent = "เชื่อมต่อไม่สำเร็จ";
      }
    }

    function bindEvents() {
      el.loginButton.addEventListener("click", doLogin);
      el.password.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });
      el.logoutButton.addEventListener("click", logout);
      el.themeSelect.addEventListener("change", (e) => applyTheme(e.target.value));
      el.pumpButton.addEventListener("click", togglePump);
      el.autoModeSwitch.addEventListener("change", toggleAutoMode);
      el.historySearch.addEventListener("input", renderHistory);
      el.refreshHistoryButton.addEventListener("click", fetchHistory);
    }

    async function boot() {
      bindEvents();
      applyTheme(getSavedTheme());

      if (state.token) {
        setLoggedIn(true);
        await initDashboard();
      } else {
        setLoggedIn(false);
      }

      setInterval(async () => {
        if (!state.token) return;
        try {
          await fetchStatus();
        } catch (error) {
          el.onlineText.textContent = "ออฟไลน์";
          el.systemStatus.textContent = "ตรวจสอบการเชื่อมต่อ";
          showError(el.errorBox, error.message);
        }
      }, state.refreshMs);

      setInterval(async () => {
        if (!state.token) return;
        try {
          await fetchHistory();
        } catch (error) {
          showError(el.errorBox, error.message);
        }
      }, 60000);
    }

    boot();
  </script>

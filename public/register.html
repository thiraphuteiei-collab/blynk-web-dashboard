<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สมัครสมาชิก</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <section class="page-center">
    <div class="auth-card">
      <h1 class="brand-title">สมัครสมาชิก</h1>
      <p class="brand-sub">สร้างบัญชีเพื่อเริ่มใช้งานระบบ</p>

      <div class="form-group">
        <label class="form-label" for="email">อีเมล</label>
        <input class="form-input" id="email" type="email" placeholder="name@example.com" />
        <div id="emailError" class="field-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="username">ชื่อผู้ใช้</label>
        <input class="form-input" id="username" type="text" placeholder="กรอกชื่อผู้ใช้" />
        <div id="usernameError" class="field-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">รหัสผ่าน</label>
        <div class="password-wrap">
          <input class="form-input" id="password" type="password" placeholder="กรอกรหัสผ่านใหม่" />
          <button id="toggleRegisterPassword" class="password-toggle" type="button"></button>
        </div>
        <div class="field-hint">อย่างน้อย 8 ตัวอักษร</div>
        <div id="passwordError" class="field-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">ยืนยันรหัสผ่าน</label>
        <div class="password-wrap">
          <input class="form-input" id="confirmPassword" type="password" placeholder="กรอกรหัสผ่านอีกครั้ง" />
          <button id="toggleRegisterConfirmPassword" class="password-toggle" type="button"></button>
        </div>
        <div id="confirmPasswordError" class="field-error"></div>
      </div>

      <div class="checkbox-row">
        <input id="acceptTerms" type="checkbox" />
        <label for="acceptTerms">ฉันยอมรับเงื่อนไขการใช้งาน</label>
      </div>

      <button id="registerButton" class="btn btn-primary full" type="button">สมัครสมาชิก</button>
      <div id="errorBox" class="message text-danger"></div>
      <div id="successBox" class="message text-success"></div>

      <div class="links-row">
        <a href="/login.html">มีบัญชีอยู่แล้ว? เข้าสู่ระบบ</a>
      </div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    redirectIfLoggedIn();
    setupPasswordToggle("toggleRegisterPassword", "password");
    setupPasswordToggle("toggleRegisterConfirmPassword", "confirmPassword");

    document.getElementById("registerButton").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();
      const acceptTerms = document.getElementById("acceptTerms").checked;
      const errorBox = document.getElementById("errorBox");
      const successBox = document.getElementById("successBox");
      const button = document.getElementById("registerButton");

      errorBox.textContent = "";
      successBox.textContent = "";
      clearFieldErrors(["email", "username", "password", "confirmPassword"]);

      let hasError = false;

      if (!email) {
        setFieldError("email", "กรุณากรอกอีเมล");
        hasError = true;
      } else if (!validateEmail(email)) {
        setFieldError("email", "รูปแบบอีเมลไม่ถูกต้อง");
        hasError = true;
      }

      if (!username) {
        setFieldError("username", "กรุณากรอกชื่อผู้ใช้");
        hasError = true;
      }

      if (!password) {
        setFieldError("password", "กรุณากรอกรหัสผ่าน");
        hasError = true;
      } else if (!validatePassword(password)) {
        setFieldError("password", "รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร");
        hasError = true;
      }

      if (!confirmPassword) {
        setFieldError("confirmPassword", "กรุณายืนยันรหัสผ่าน");
        hasError = true;
      } else if (password !== confirmPassword) {
        setFieldError("confirmPassword", "รหัสผ่านไม่ตรงกัน");
        hasError = true;
      }

      if (!acceptTerms) {
        errorBox.textContent = "กรุณายอมรับเงื่อนไขการใช้งาน";
        hasError = true;
      }

      if (hasError) return;

      try {
        setButtonLoading(button, true, "กำลังสมัครสมาชิก...", "สมัครสมาชิก");

        await fetchJson("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, username, password })
        });

        successBox.textContent = "สมัครสมาชิกสำเร็จ กรุณาเข้าสู่ระบบ";
        showToast("สมัครสมาชิกสำเร็จ", "success");

        setTimeout(() => {
          window.location.href = "/login.html";
        }, 700);
      } catch (error) {
        errorBox.textContent = error.message;
      } finally {
        setButtonLoading(button, false, "", "สมัครสมาชิก");
      }
    });
  </script>
</body>
</html>
